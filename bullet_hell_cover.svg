<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1c"/>
      <stop offset="50%" style="stop-color:#12182e"/>
      <stop offset="100%" style="stop-color:#05060d"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="45%" r="65%">
      <stop offset="0%" style="stop-color:#1e3a5c;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#020308;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#vignette)"/>
  <!-- Bullet arcs -->
  <g opacity="0.92" filter="url(#glow)">
    <circle cx="420" cy="100" r="5" fill="#ff5577"/>
    <circle cx="480" cy="140" r="4" fill="#55ffcc"/>
    <circle cx="520" cy="90" r="4.5" fill="#7799ff"/>
    <circle cx="380" cy="160" r="4" fill="#dd77ff"/>
    <circle cx="450" cy="200" r="5" fill="#ffaa44"/>
    <circle cx="540" cy="180" r="4" fill="#66eeff"/>
    <circle cx="340" cy="120" r="3.5" fill="#ff5577"/>
    <circle cx="500" cy="240" r="4" fill="#55ffcc"/>
    <circle cx="400" cy="220" r="4" fill="#7799ff"/>
    <circle cx="560" cy="130" r="3.5" fill="#ffaa44"/>
    <circle cx="360" cy="200" r="4" fill="#dd77ff"/>
    <circle cx="470" cy="280" r="4.5" fill="#66eeff"/>
  </g>
  <!-- Spiral hint -->
  <g opacity="0.25" stroke="#66d4ff" fill="none" stroke-width="1">
    <path d="M 280 40 Q 400 120 520 200"/>
    <path d="M 300 60 Q 410 130 500 220"/>
  </g>
  <!-- Player -->
  <g filter="url(#softglow)">
    <circle cx="220" cy="200" r="14" fill="#dff6ff" opacity="0.95"/>
    <circle cx="216" cy="196" r="3" fill="#1a3048"/>
    <circle cx="224" cy="196" r="3" fill="#1a3048"/>
  </g>
  <circle cx="220" cy="200" r="6" fill="none" stroke="rgba(120,220,255,0.5)" stroke-width="1.5" stroke-dasharray="3 3"/>
  <!-- Title -->
  <text x="320" y="52" text-anchor="middle" fill="#e8ecff" font-family="system-ui,Segoe UI,sans-serif" font-size="28" font-weight="800" letter-spacing="0.06em">SURVIVAL</text>
  <text x="320" y="82" text-anchor="middle" fill="#66d4ff" font-family="system-ui,Segoe UI,sans-serif" font-size="22" font-weight="700" letter-spacing="0.35em">DANMAKU</text>
  <text x="320" y="108" text-anchor="middle" fill="#7a8cad" font-family="system-ui,Segoe UI,sans-serif" font-size="11" font-weight="600" letter-spacing="0.2em">DODGE · SURVIVE · GLOBAL BOARD</text>
</svg>
